services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: docs-diver-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - docs_diver_pgdata:/var/lib/postgresql/data

volumes:
  docs_diver_pgdata: